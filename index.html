<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Production Logger</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #4f8ef7;
      --accent-hover: #3a7aee;
      --danger: #e05252;
      --danger-hover: #c43e3e;
      --success: #3ecf8e;
      --text: #e2e4ed;
      --muted: #6b7280;
      --log-row-odd: #1e2130;
      --log-row-even: #1a1d27;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    #wall-clock {
      font-variant-numeric: tabular-nums;
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--muted);
      line-height: 1;
      margin-left: auto;
    }

    #wall-clock .ampm {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      margin-left: 0.2rem;
      vertical-align: super;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    header p {
      color: var(--muted);
      margin-top: 0.4rem;
      font-size: 0.9rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 720px;
      margin-bottom: 1.5rem;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.active {
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #status-text {
      font-size: 0.9rem;
      color: var(--muted);
    }

    #status-text.active { color: var(--success); }

    #elapsed-display {
      text-align: center;
      margin-bottom: 1.25rem;
    }

    #elapsed {
      font-variant-numeric: tabular-nums;
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--muted);
      transition: color 0.3s;
      line-height: 1;
    }

    #elapsed.active {
      color: var(--success);
      text-shadow: 0 0 18px rgba(62, 207, 142, 0.35);
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1.4rem;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
    }

    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    #btn-start {
      background: var(--accent);
      color: #fff;
    }
    #btn-start:hover:not(:disabled) { background: var(--accent-hover); }

    #btn-log {
      background: var(--success);
      color: #000;
    }
    #btn-log:hover:not(:disabled) { background: #32be7e; }

    #btn-stop {
      background: var(--danger);
      color: #fff;
      margin-left: auto;
    }
    #btn-stop:hover:not(:disabled) { background: var(--danger-hover); }

    /* Log input area */
    #log-input-area {
      display: none;
      margin-top: 1.25rem;
      gap: 0.75rem;
    }

    #log-input-area.visible {
      display: flex;
    }

    #note-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 0.6rem 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    #note-input:focus { border-color: var(--accent); }
    #note-input::placeholder { color: var(--muted); }

    #btn-submit-note {
      background: var(--accent);
      color: #fff;
      padding: 0.6rem 1.2rem;
    }
    #btn-submit-note:hover { background: var(--accent-hover); }

    /* Log table */
    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .log-header h2 {
      font-size: 1rem;
      font-weight: 600;
    }

    #entry-count {
      font-size: 0.8rem;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.2rem 0.7rem;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead th {
      background: var(--bg);
      text-align: left;
      padding: 0.6rem 0.9rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.5px;
    }

    tbody tr:nth-child(odd)  { background: var(--log-row-odd); }
    tbody tr:nth-child(even) { background: var(--log-row-even); }

    tbody td {
      padding: 0.55rem 0.9rem;
      vertical-align: top;
    }

    .td-seq {
      color: var(--muted);
      width: 3rem;
      text-align: right;
      padding-right: 1rem;
    }

    .td-time {
      width: 12rem;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      color: var(--muted);
    }

    .td-elapsed {
      width: 6rem;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      color: var(--muted);
    }

    .td-note { word-break: break-word; }

    #empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    footer {
      margin-top: auto;
      padding-top: 2rem;
      color: var(--muted);
      font-size: 0.78rem;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>Production Logger</h1>
  <p>Record timestamped notes during a production session.</p>
</header>

<!-- Session controls -->
<div class="card">
  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Session not started</span>
    <div id="wall-clock"><span id="clock-time"></span><span class="ampm" id="clock-ampm"></span></div>
  </div>

  <div id="elapsed-display">
    <span id="elapsed">00:00</span>
  </div>

  <div class="controls">
    <button id="btn-start">Start</button>
    <button id="btn-log" disabled>Log</button>
    <button id="btn-stop" disabled>Stop &amp; Export</button>
  </div>

  <div id="log-input-area">
    <input id="note-input" type="text" placeholder="Enter note and press Enter or Submit…" maxlength="500" autocomplete="off">
    <button id="btn-submit-note">Submit</button>
  </div>
</div>

<!-- Log entries -->
<div class="card">
  <div class="log-header">
    <h2>Session Log</h2>
    <span id="entry-count">0 entries</span>
  </div>
  <div class="table-wrap">
    <table id="log-table">
      <thead>
        <tr>
          <th class="td-seq">#</th>
          <th class="td-time">Timestamp</th>
          <th class="td-elapsed">Elapsed</th>
          <th>Note</th>
        </tr>
      </thead>
      <tbody id="log-body">
        <tr id="empty-row">
          <td colspan="4">
            <div id="empty-state">No entries yet. Start a session and click Log to add notes.</div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<footer>Production Logger &mdash; data never leaves your browser.</footer>

<script>
  // Wall clock
  (() => {
    const timeEl = document.getElementById('clock-time');
    const ampmEl = document.getElementById('clock-ampm');
    function tick() {
      const now = new Date();
      let h = now.getHours();
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      timeEl.textContent = `${h}:${m}:${s}`;
      ampmEl.textContent = ampm;
    }
    tick();
    setInterval(tick, 1000);
  })();

  (() => {
    const btnStart  = document.getElementById('btn-start');
    const btnLog    = document.getElementById('btn-log');
    const btnStop   = document.getElementById('btn-stop');
    const btnSubmit = document.getElementById('btn-submit-note');
    const noteInput = document.getElementById('note-input');
    const logBody   = document.getElementById('log-body');
    const emptyRow  = document.getElementById('empty-row');
    const entryCount= document.getElementById('entry-count');
    const statusDot = document.getElementById('status-dot');
    const statusText= document.getElementById('status-text');
    const elapsedEl = document.getElementById('elapsed');
    const inputArea = document.getElementById('log-input-area');

    let sessionStart = null;
    let entries = [];
    let timerInterval = null;

    // ── Helpers ──────────────────────────────────────────────────────────────

    function pad(n, w = 2) { return String(n).padStart(w, '0'); }

    function formatDatetime(d) {
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} `
           + `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function elapsedSince(start, now) {
      const s = Math.floor((now - start) / 1000);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      return h > 0
        ? `${pad(h)}:${pad(m)}:${pad(sec)}`
        : `${pad(m)}:${pad(sec)}`;
    }

    function escapeCsv(val) {
      const s = String(val);
      return /[",\n\r]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
    }

    // ── Session timer ─────────────────────────────────────────────────────────

    function startTimer() {
      timerInterval = setInterval(() => {
        elapsedEl.textContent = elapsedSince(sessionStart, Date.now());
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    // ── UI state helpers ──────────────────────────────────────────────────────

    function setActive(active) {
      statusDot.classList.toggle('active', active);
      statusText.classList.toggle('active', active);
      statusText.textContent = active ? 'Session active' : 'Session stopped';
      btnStart.disabled  =  active;
      btnLog.disabled    = !active;
      btnStop.disabled   = !active;
    }

    function hideInput() {
      inputArea.classList.remove('visible');
      noteInput.value = '';
    }

    // ── Add entry ─────────────────────────────────────────────────────────────

    function addEntry(note) {
      note = note.trim();
      if (!note) { noteInput.focus(); return; }

      const now = new Date();
      const entry = {
        seq: entries.length + 1,
        timestamp: formatDatetime(now),
        elapsed: elapsedSince(sessionStart, now),
        note
      };
      entries.push(entry);

      // Remove empty state row if present
      if (emptyRow.parentNode) emptyRow.remove();

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="td-seq">${entry.seq}</td>
        <td class="td-time">${entry.timestamp}</td>
        <td class="td-elapsed">${entry.elapsed}</td>
        <td class="td-note">${entry.note.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</td>
      `;
      logBody.appendChild(tr);

      const plural = entries.length === 1 ? 'entry' : 'entries';
      entryCount.textContent = `${entries.length} ${plural}`;

      hideInput();
      tr.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ── CSV export ────────────────────────────────────────────────────────────

    function exportCsv() {
      const header = ['#', 'Timestamp', 'Elapsed', 'Note'];
      const rows = entries.map(e => [e.seq, e.timestamp, e.elapsed, e.note]);

      const csv = [header, ...rows]
        .map(row => row.map(escapeCsv).join(','))
        .join('\r\n');

      const now = new Date();
      const fname = `production-log_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`
                  + `_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}.csv`;

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = fname; a.click();
      URL.revokeObjectURL(url);
    }

    // ── Event handlers ────────────────────────────────────────────────────────

    btnStart.addEventListener('click', () => {
      sessionStart = Date.now();
      entries = [];
      logBody.innerHTML = '';
      logBody.appendChild(emptyRow);
      entryCount.textContent = '0 entries';
      elapsedEl.textContent = '00:00';
      elapsedEl.classList.add('active');
      hideInput();
      setActive(true);
      startTimer();
    });

    btnLog.addEventListener('click', () => {
      inputArea.classList.toggle('visible');
      if (inputArea.classList.contains('visible')) {
        noteInput.focus();
      } else {
        noteInput.value = '';
      }
    });

    btnStop.addEventListener('click', () => {
      stopTimer();
      setActive(false);
      hideInput();
      elapsedEl.textContent = '00:00';
      elapsedEl.classList.remove('active');
      if (entries.length > 0) {
        exportCsv();
      }
    });

    btnSubmit.addEventListener('click', () => addEntry(noteInput.value));

    noteInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') addEntry(noteInput.value);
      if (e.key === 'Escape') hideInput();
    });
  })();
</script>
</body>
</html>
