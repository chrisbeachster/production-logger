<!DOCTYPE html>
<html lang="en" class="bg-[#0f1117]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Production Logger</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#1a1d27',
            border:  '#2a2d3a',
            accent:  '#4f8ef7',
            success: '#3ecf8e',
            danger:  '#e05252',
            muted:   '#6b7280',
            base:    '#0f1117',
          },
          fontFamily: {
            sans: ['"Segoe UI"', 'system-ui', '-apple-system', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    /* Tabular nums for all clocks */
    #elapsed, #clock-time { font-variant-numeric: tabular-nums; }

    /* Active elapsed glow */
    #elapsed.active { color: #3ecf8e; text-shadow: 0 0 18px rgba(62,207,142,0.35); }

    /* Active status dot pulse */
    @keyframes dot-pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    #status-dot.active {
      background: #3ecf8e;
      box-shadow: 0 0 6px #3ecf8e;
      animation: dot-pulse 1.5s infinite;
    }

    /* Active status text */
    #status-text.active { color: #3ecf8e; }

    /* Log input hidden/visible */
    #log-input-area { display: none; }
    #log-input-area.visible { display: flex; }

    /* Striped table rows */
    #log-body tr:nth-child(odd)  { background: #1e2130; }
    #log-body tr:nth-child(even) { background: #1a1d27; }
  </style>
</head>
<body class="min-h-screen bg-[#0f1117] text-[#e2e4ed] font-sans flex flex-col items-center px-4 py-8">

  <!-- Header -->
  <header class="text-center mb-8">
    <h1 class="text-3xl font-bold tracking-wide">Production Logger</h1>
    <p class="text-muted text-sm mt-1">Record timestamped notes during a production session.</p>
  </header>

  <!-- Session controls card -->
  <div class="w-full max-w-2xl bg-surface border border-border rounded-xl p-6 mb-6">

    <!-- Status bar -->
    <div class="flex items-center gap-3 mb-5">
      <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-muted flex-shrink-0 transition-colors duration-300"></div>
      <span id="status-text" class="text-sm text-muted">Session not started</span>
      <!-- Wall clock -->
      <div id="wall-clock" class="ml-auto text-muted font-semibold tracking-wide leading-none">
        <span id="clock-time" class="text-xl"></span><sup id="clock-ampm" class="text-[0.6rem] font-medium ml-0.5 tracking-wide"></sup>
      </div>
    </div>

    <!-- Elapsed timer -->
    <div class="text-center mb-5">
      <span id="elapsed" class="text-6xl font-bold tracking-widest text-muted transition-colors duration-300 leading-none">00:00</span>
    </div>

    <!-- Buttons -->
    <div class="flex flex-wrap gap-3">
      <button id="btn-start"
        class="px-5 py-2 rounded-lg bg-accent text-white font-semibold text-sm transition-all hover:bg-blue-500 active:scale-95 disabled:opacity-35 disabled:cursor-not-allowed disabled:scale-100">
        Start
      </button>
      <button id="btn-log" disabled
        class="px-5 py-2 rounded-lg bg-success text-black font-semibold text-sm transition-all hover:bg-emerald-400 active:scale-95 disabled:opacity-35 disabled:cursor-not-allowed disabled:scale-100">
        Log
      </button>
      <button id="btn-stop" disabled
        class="ml-auto px-5 py-2 rounded-lg bg-danger text-white font-semibold text-sm transition-all hover:bg-red-600 active:scale-95 disabled:opacity-35 disabled:cursor-not-allowed disabled:scale-100">
        Stop &amp; Export
      </button>
    </div>

    <!-- Note input -->
    <div id="log-input-area" class="mt-4 gap-3">
      <input id="note-input" type="text" maxlength="500" autocomplete="off"
        placeholder="Enter note and press Enter or Submit…"
        class="flex-1 bg-base border border-border rounded-lg text-[#e2e4ed] text-sm px-3.5 py-2 outline-none focus:border-accent transition-colors placeholder-muted">
      <button id="btn-submit-note"
        class="px-4 py-2 rounded-lg bg-accent text-white font-semibold text-sm hover:bg-blue-500 active:scale-95 transition-all">
        Submit
      </button>
    </div>
  </div>

  <!-- Log entries card -->
  <div class="w-full max-w-2xl bg-surface border border-border rounded-xl p-6 mb-6">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-base font-semibold">Session Log</h2>
      <span id="entry-count" class="text-xs text-muted bg-base border border-border rounded-full px-3 py-0.5">0 entries</span>
    </div>

    <div class="overflow-x-auto rounded-lg border border-border">
      <table class="w-full border-collapse text-sm">
        <thead>
          <tr class="bg-base">
            <th class="text-right text-xs font-semibold text-muted uppercase tracking-wide px-3 py-2 w-10">#</th>
            <th class="text-left  text-xs font-semibold text-muted uppercase tracking-wide px-3 py-2 w-44 whitespace-nowrap">Timestamp</th>
            <th class="text-left  text-xs font-semibold text-muted uppercase tracking-wide px-3 py-2 w-20">Elapsed</th>
            <th class="text-left  text-xs font-semibold text-muted uppercase tracking-wide px-3 py-2">Note</th>
          </tr>
        </thead>
        <tbody id="log-body">
          <tr id="empty-row">
            <td colspan="4" class="text-center text-muted text-sm py-8">
              No entries yet. Start a session and click Log to add notes.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <footer class="mt-auto pt-4 text-muted text-xs text-center">
    Production Logger &mdash; data never leaves your browser.
  </footer>

<script>
  // Wall clock
  (() => {
    const timeEl = document.getElementById('clock-time');
    const ampmEl = document.getElementById('clock-ampm');
    function tick() {
      const now = new Date();
      let h = now.getHours();
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      timeEl.textContent = `${h}:${m}:${s}`;
      ampmEl.textContent = ampm;
    }
    tick();
    setInterval(tick, 1000);
  })();

  (() => {
    const btnStart  = document.getElementById('btn-start');
    const btnLog    = document.getElementById('btn-log');
    const btnStop   = document.getElementById('btn-stop');
    const btnSubmit = document.getElementById('btn-submit-note');
    const noteInput = document.getElementById('note-input');
    const logBody   = document.getElementById('log-body');
    const emptyRow  = document.getElementById('empty-row');
    const entryCount= document.getElementById('entry-count');
    const statusDot = document.getElementById('status-dot');
    const statusText= document.getElementById('status-text');
    const elapsedEl = document.getElementById('elapsed');
    const inputArea = document.getElementById('log-input-area');

    let sessionStart = null;
    let entries = [];
    let timerInterval = null;

    function pad(n, w = 2) { return String(n).padStart(w, '0'); }

    function formatDatetime(d) {
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} `
           + `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function elapsedSince(start, now) {
      const s = Math.floor((now - start) / 1000);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      return h > 0
        ? `${pad(h)}:${pad(m)}:${pad(sec)}`
        : `${pad(m)}:${pad(sec)}`;
    }

    function escapeCsv(val) {
      const s = String(val);
      return /[",\n\r]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
    }

    function startTimer() {
      timerInterval = setInterval(() => {
        elapsedEl.textContent = elapsedSince(sessionStart, Date.now());
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    function setActive(active) {
      statusDot.classList.toggle('active', active);
      statusText.classList.toggle('active', active);
      statusText.textContent = active ? 'Session active' : 'Session stopped';
      btnStart.disabled =  active;
      btnLog.disabled   = !active;
      btnStop.disabled  = !active;
    }

    function hideInput() {
      inputArea.classList.remove('visible');
      noteInput.value = '';
    }

    function addEntry(note) {
      note = note.trim();
      if (!note) { noteInput.focus(); return; }

      const now = new Date();
      const entry = {
        seq: entries.length + 1,
        timestamp: formatDatetime(now),
        elapsed: elapsedSince(sessionStart, now),
        note
      };
      entries.push(entry);

      if (emptyRow.parentNode) emptyRow.remove();

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="text-right text-muted px-3 py-2 align-top">${entry.seq}</td>
        <td class="text-muted px-3 py-2 align-top whitespace-nowrap" style="font-variant-numeric:tabular-nums">${entry.timestamp}</td>
        <td class="text-muted px-3 py-2 align-top whitespace-nowrap" style="font-variant-numeric:tabular-nums">${entry.elapsed}</td>
        <td class="px-3 py-2 align-top break-words">${entry.note.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</td>
      `;
      logBody.appendChild(tr);

      const plural = entries.length === 1 ? 'entry' : 'entries';
      entryCount.textContent = `${entries.length} ${plural}`;

      hideInput();
      tr.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function exportCsv() {
      const header = ['#', 'Timestamp', 'Elapsed', 'Note'];
      const rows = entries.map(e => [e.seq, e.timestamp, e.elapsed, e.note]);
      const csv = [header, ...rows].map(row => row.map(escapeCsv).join(',')).join('\r\n');

      const now = new Date();
      const fname = `production-log_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`
                  + `_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}.csv`;

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = fname; a.click();
      URL.revokeObjectURL(url);
    }

    btnStart.addEventListener('click', () => {
      sessionStart = Date.now();
      entries = [];
      logBody.innerHTML = '';
      logBody.appendChild(emptyRow);
      entryCount.textContent = '0 entries';
      elapsedEl.textContent = '00:00';
      elapsedEl.classList.add('active');
      hideInput();
      setActive(true);
      startTimer();
    });

    btnLog.addEventListener('click', () => {
      inputArea.classList.toggle('visible');
      if (inputArea.classList.contains('visible')) {
        noteInput.focus();
      } else {
        noteInput.value = '';
      }
    });

    btnStop.addEventListener('click', () => {
      stopTimer();
      setActive(false);
      hideInput();
      elapsedEl.textContent = '00:00';
      elapsedEl.classList.remove('active');
      if (entries.length > 0) exportCsv();
    });

    btnSubmit.addEventListener('click', () => addEntry(noteInput.value));

    noteInput.addEventListener('keydown', e => {
      if (e.key === 'Enter')  addEntry(noteInput.value);
      if (e.key === 'Escape') hideInput();
    });
  })();
</script>
</body>
</html>
